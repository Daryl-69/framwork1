# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with: connect repo → Render auto-detects this file

services:
  # ── Backend (FastAPI) ─────────────────────────────────────
  - type: web
    name: resume-scanner-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard        # 2 GB RAM — needed for T5 + GLiNER models
    envVars:
      - key: LLAMA_CLOUD_API_KEY
        sync: false       # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
